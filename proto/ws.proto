syntax = "proto3";
package im;

enum WsFrameType {
  PING = 0;
  PONG = 1;
  AUTH = 2;
  AUTH_RESULT = 3;
  CHAT_MESSAGE = 4;
  MESSAGE_ACK = 5;
  CONVERSATION_UPDATE = 6;
  FRIEND_REQUEST = 7;
  FRIEND_ACCEPTED = 8;
  FRIEND_REMOVED = 9;
  GROUP_JOIN_REQUEST = 10;
  GROUP_INFO_UPDATE = 11;
  USER_ONLINE = 12;
  USER_OFFLINE = 13;
  ONLINE_LIST = 14;
  READ_RECEIPT = 15;
}

message WsFrame {
  WsFrameType type = 1;
  bytes payload = 2;
}

message AuthRequest {
  string token = 1;
}

message AuthResult {
  bool success = 1;
  string message = 2;
}

message FriendRequestNotification {
  string request_id = 1;
  string from_user_id = 2;
  string nickname = 3;
  string avatar = 4;
  string message = 5;
  int64 created_at = 6;
}

message FriendAcceptedNotification {
  string friend_id = 1;
  string nickname = 2;
  string avatar = 3;
  int64 created_at = 4;
}

message FriendRemovedNotification {
  string friend_id = 1;
}

message GroupJoinRequestNotification {
  string request_id = 1;
  string conversation_id = 2;
  string group_name = 3;
  string user_id = 4;
  string nickname = 5;
  string avatar = 6;
  string message = 7;
  int64 created_at = 8;
}
